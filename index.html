<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEVELUP — Game Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --surface3: #252733;
    --accent: #e8ff47;
    --accent2: #5b8dee;
    --border: #2e3040;
    --text: #f0f2f8;
    --text2: #8b90a8;
    --text3: #5a5f75;
    --warn: #fbbf24;
    --pass: #4ade80;
    --fail: #f87171;
    --rp: #ff6b6b;
    --ps: #4fa3f7;
    --sw: #e4000f;
    --sx: #4ade80;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .topbar-left { display: flex; align-items: baseline; gap: 12px; }
  .logo { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
  .tagline { font-size: 12px; color: var(--text3); letter-spacing: 0.5px; }
  .topbar-right { display: flex; gap: 8px; }

  .tab-btn {
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.5px; padding: 8px 20px; border-radius: 8px; cursor: pointer;
    transition: all .15s; background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border);
  }
  .tab-btn:hover { color: var(--text); background: var(--surface3); }
  .tab-btn.active { background: var(--accent); color: #0e0f13; border-color: var(--accent); }

  .main { flex: 1; padding: 24px 28px; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .stat-num { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; line-height: 1; color: var(--accent); }
  .stat-lbl { font-size: 12px; color: var(--text3); margin-top: 3px; letter-spacing: 0.3px; }

  /* ── Platform pills ── */
  .platform-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .plat-pill {
    font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600;
    letter-spacing: 0.5px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); cursor: pointer; transition: all .15s;
    color: var(--text2); background: transparent;
  }
  .plat-pill:hover { border-color: var(--text3); color: var(--text); }
  .plat-pill.active { color: #fff; }
  .plat-pill.all.active  { background: var(--accent2); border-color: var(--accent2); }
  .plat-pill.rp.active   { background: var(--rp); border-color: var(--rp); }
  .plat-pill.ps.active   { background: var(--ps); border-color: var(--ps); }
  .plat-pill.sw.active   { background: var(--sw); border-color: var(--sw); }
  .plat-pill.sx.active   { background: var(--sx); border-color: var(--sx); color: #0e0f13; }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px 9px 38px; color: var(--text);
    font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { outline: none; border-color: var(--accent2); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }
  .filter-sel {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .filter-sel:focus { outline: none; }
  .filter-sel option { background: var(--surface2); }
  .add-btn {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
    letter-spacing: 0.5px; padding: 9px 20px; background: var(--accent);
    color: #0e0f13; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap;
  }
  .add-btn:hover { opacity: .88; }

  /* ── Game grid ── */
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
  .game-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; cursor: pointer; transition: all .18s;
  }
  .game-card:hover { border-color: var(--accent2); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .game-art { height: 130px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .game-art img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .35s; }
  .game-card:hover .game-art img { transform: scale(1.07); }
  .game-art-emoji { font-size: 42px; }
  .art-loading-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--border); overflow: hidden;
  }
  .art-loading-bar::after {
    content: ''; position: absolute; inset: 0; background: var(--accent2);
    animation: bar-slide 1.4s ease-in-out infinite;
  }
  @keyframes bar-slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
  .game-badge {
    position: absolute; top: 8px; right: 8px; font-size: 10px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 0.5px;
    padding: 3px 8px; border-radius: 5px; z-index: 2;
  }
  .badge-played   { background: rgba(74,222,128,.85); color: #052e16; }
  .badge-playing  { background: rgba(251,191,36,.85); color: #451a03; }
  .badge-backlog  { background: rgba(30,32,41,.9); color: #8b90a8; border: 1px solid rgba(139,144,168,.3); }
  .badge-wishlist { background: rgba(91,141,238,.85); color: #0f172a; }
  .plat-dot { position: absolute; top: 8px; left: 8px; width: 9px; height: 9px; border-radius: 50%; z-index: 2; }
  .dot-rp { background: var(--rp); } .dot-ps { background: var(--ps); }
  .dot-sw { background: var(--sw); } .dot-sx { background: var(--sx); }
  .game-info { padding: 10px 13px 13px; }
  .game-title { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.3px; margin-bottom: 4px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-meta { display: flex; align-items: center; justify-content: space-between; }
  .game-genre { font-size: 11px; color: var(--text3); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.8);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
    width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); z-index: 2;
  }
  .modal-head h2 { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .close-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
    font-size: 16px; cursor: pointer; padding: 5px 10px; line-height: 1; border-radius: 7px;
  }
  .close-btn:hover { color: var(--text); }
  .modal-body { padding: 18px 24px; }
  .modal-art-preview {
    width: 100%; height: 150px; background: var(--surface2); border-radius: 10px;
    overflow: hidden; margin-bottom: 16px; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .modal-art-preview img { width: 100%; height: 100%; object-fit: cover; }
  .modal-art-preview .no-art-label { font-size: 13px; color: var(--text3); }

  .form-group { margin-bottom: 15px; }
  .form-group label {
    display: block; font-size: 11px; color: var(--text2); margin-bottom: 6px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 13px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent2); }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .form-group select option { background: var(--surface2); }

  .art-results-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 8px; }
  .art-thumb { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
  .art-thumb:hover, .art-thumb.selected { border-color: var(--accent2); }

  .star-picker { display: flex; gap: 6px; margin-top: 4px; }
  .star-pick { font-size: 26px; cursor: pointer; color: var(--border); transition: color .1s; background: none; border: none; padding: 0; }
  .star-pick.lit { color: var(--warn); }
  .star-pick:hover { color: var(--warn); }

  .plat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
  .plat-option {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 9px; cursor: pointer;
    background: var(--surface2); transition: all .15s;
  }
  .plat-option:hover { border-color: var(--text3); }
  .plat-option.selected { border-color: var(--accent2); background: rgba(91,141,238,.12); }
  .plat-option .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .plat-option .name { font-size: 13px; color: var(--text); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .modal-foot {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px; align-items: center;
  }
  .btn-ghost {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 18px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text3); }
  .btn-primary {
    background: var(--accent); border: none; border-radius: 9px; padding: 9px 22px;
    color: #0e0f13; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px;
    letter-spacing: 0.5px; cursor: pointer;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-danger {
    background: #7f1d1d; border: 1px solid #f87171; border-radius: 9px; padding: 9px 16px;
    color: #fca5a5; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; margin-right: auto;
  }
  .btn-danger:hover { background: #991b1b; }
  .btn-secondary {
    background: var(--surface3); border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 14px; color: var(--text2); font-family: 'Rajdhani', sans-serif; font-weight: 600;
    font-size: 13px; cursor: pointer; width: 100%; margin-top: 8px; letter-spacing: 0.3px;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text3); }
  .btn-secondary:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Recommend ── */
  .rec-wrap { max-width: 580px; margin: 0 auto; }
  .rec-hero { text-align: center; padding: 28px 0 22px; }
  .rec-hero h2 { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 2px; color: var(--accent); margin-bottom: 6px; }
  .rec-hero p { font-size: 14px; color: var(--text3); }
  .rec-options { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .rec-opt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; cursor: pointer; transition: all .15s; text-align: center; }
  .rec-opt-card:hover, .rec-opt-card.selected { border-color: var(--accent2); background: rgba(91,141,238,.08); }
  .rec-opt-card .icon { font-size: 30px; margin-bottom: 8px; }
  .rec-opt-card .ttl { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .rec-opt-card .desc { font-size: 12px; color: var(--text3); }
  .rec-config { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .rec-config label { font-size: 11px; color: var(--text2); font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .rec-config select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; }
  .rec-config select:focus { outline: none; border-color: var(--accent2); }
  .spin-btn { width: 100%; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; padding: 15px; background: var(--accent); color: #0e0f13; border: none; border-radius: 12px; cursor: pointer; }
  .spin-btn:hover { opacity: .88; }
  .spin-btn:disabled { opacity: .4; cursor: not-allowed; }
  .loading-dots { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 20px; }
  .loading-dots span { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:scale(.5);opacity:.4} 40%{transform:scale(1);opacity:1} }
  .rec-result { background: var(--surface); border: 1px solid var(--accent2); border-radius: 16px; overflow: hidden; margin-top: 18px; animation: fadeSlide .3s ease; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .rec-result-art { height: 160px; overflow: hidden; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
  .rec-result-art img { width: 100%; height: 100%; object-fit: cover; }
  .rec-result-art .emoji-fallback { font-size: 48px; }
  .rec-result-body { padding: 18px 20px; }
  .rec-title { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; color: var(--accent); }
  .rec-sub { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .rec-reason { font-size: 14px; color: var(--text2); line-height: 1.65; }
  .rec-tag { display: inline-block; font-size: 11px; font-family: 'Rajdhani', sans-serif; font-weight: 600; padding: 3px 9px; border-radius: 5px; margin-right: 6px; margin-bottom: 9px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .mark-played-btn { display: block; width: 100%; margin-top: 14px; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; padding: 10px 18px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 9px; cursor: pointer; }
  .mark-played-btn:hover { background: rgba(232,255,71,.08); }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
  .empty-state .e-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-state p { font-size: 15px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .topbar { padding: 14px 16px; }
    .main { padding: 18px 16px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .game-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .form-row { grid-template-columns: 1fr; }
    .rec-options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">LEVELUP</div>
      <div class="tagline">game library</div>
    </div>
    <div class="topbar-right">
      <button class="tab-btn active" id="tab-library" onclick="switchTab('library')">Library</button>
      <button class="tab-btn" id="tab-rec" onclick="switchTab('rec')">Recommend</button>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<!-- Edit / Add Modal container -->
<div id="modal-layer"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const RAWG_KEY = '3571b0f910b2408f9a5becc6e9e7b8f1';

const PLATFORMS = [
  { id: 'rp', name: 'Retroid Pocket 5', short: 'RP5',      color: '#ff6b6b' },
  { id: 'ps', name: 'PlayStation 5',    short: 'PS5',      color: '#4fa3f7' },
  { id: 'sw', name: 'Nintendo Switch',  short: 'Switch',   color: '#e4000f' },
  { id: 'sx', name: 'Xbox Series X',    short: 'Series X', color: '#4ade80' },
];
const STATUSES = ['Playing', 'Played', 'Backlog', 'Wishlist'];
const GENRES   = ['Action','RPG','Adventure','Strategy','Platformer','Shooter','Sports','Racing','Puzzle','Horror','Fighting','Simulation','Other'];
const GENRE_EMOJI = { Action:'⚔️', RPG:'🧙', Adventure:'🏰', Strategy:'♟️', Platformer:'🎮', Shooter:'🔫', Sports:'⚽', Racing:'🏎️', Puzzle:'🧩', Horror:'💀', Fighting:'🥊', Simulation:'🌿', Other:'🎮' };

// ── State ────────────────────────────────────────────────────────────────────
let games = [];
let artCache = {};   // { gameTitle: imageUrl }
let fetchingArt = new Set();

let tab = 'library';
let filterPlatform = 'all';
let filterStatus   = 'all';
let searchQ        = '';

let modalMode = null; // 'add' | 'edit'
let editId    = null;
let pendingGame    = {};
let pendingStars   = 0;
let pendingArtUrl  = '';
let pendingArtOpts = [];

let recMode     = 'random';
let recLastGame = '';
let recResult   = null;
let recLoading  = false;

// ── Persistence ──────────────────────────────────────────────────────────────
function saveGames() { localStorage.setItem('lu_games', JSON.stringify(games)); }
function saveArt()   { localStorage.setItem('lu_art',   JSON.stringify(artCache)); }

function loadData() {
  try { const g = localStorage.getItem('lu_games'); if (g) games = JSON.parse(g); } catch(e){}
  try { const a = localStorage.getItem('lu_art');   if (a) artCache = JSON.parse(a); } catch(e){}

  if (games.length === 0) {
    games = [
      { id:'g1', title:'Elden Ring',                    platform:'sx', genre:'RPG',         status:'Played',  stars:5, notes:'Absolute masterpiece. 150+ hours.' },
      { id:'g2', title:'Zelda: Tears of the Kingdom',   platform:'sw', genre:'Adventure',   status:'Playing', stars:5, notes:'Still going...' },
      { id:'g3', title:'God of War Ragnarök',           platform:'ps', genre:'Action',      status:'Played',  stars:4, notes:'' },
      { id:'g4', title:'Hades',                         platform:'sx', genre:'Action',      status:'Played',  stars:5, notes:'Perfect roguelite' },
      { id:'g5', title:"Baldur's Gate 3",               platform:'ps', genre:'RPG',         status:'Backlog', stars:0, notes:'' },
      { id:'g6', title:'Super Mario Odyssey',           platform:'sw', genre:'Platformer',  status:'Played',  stars:4, notes:'' },
      { id:'g7', title:'Starfield',                     platform:'sx', genre:'RPG',         status:'Backlog', stars:0, notes:'' },
      { id:'g8', title:'Sonic Mania',                   platform:'rp', genre:'Platformer',  status:'Played',  stars:4, notes:'Great on RP5' },
      { id:'g9', title:'Hollow Knight',                 platform:'rp', genre:'Adventure',   status:'Playing', stars:4, notes:'Challenging but beautiful' },
    ];
    saveGames();
  }
}

// ── RAWG Art Fetching ────────────────────────────────────────────────────────
async function fetchArt(title) {
  if (artCache[title] || fetchingArt.has(title)) return;
  fetchingArt.add(title);
  render();
  try {
    const q   = encodeURIComponent(title);
    const res = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&search=${q}&page_size=1&search_precise=true`);
    const data = await res.json();
    const img  = data.results?.[0]?.background_image;
    if (img) { artCache[title] = img; saveArt(); }
  } catch(e) {}
  fetchingArt.delete(title);
  render();
}

async function fetchArtOptions(title) {
  try {
    const q   = encodeURIComponent(title);
    const res = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&search=${q}&page_size=8`);
    const data = await res.json();
    return (data.results || []).filter(g => g.background_image).map(g => ({ name: g.name, url: g.background_image }));
  } catch(e) { return []; }
}

async function fetchAllMissingArt() {
  for (const g of games) {
    if (!artCache[g.title]) await fetchArt(g.title);
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function uid()     { return Math.random().toString(36).slice(2, 10); }
function escH(s)   { return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function platShort(id) { return PLATFORMS.find(p => p.id === id)?.short || id; }
function artBg(p)  { return { rp:'#1a0f0f', ps:'#0a0e1a', sw:'#1a0a0a', sx:'#0a1a0a' }[p] || '#141418'; }
function starsHtml(n, size=11) {
  return [1,2,3,4,5].map(i => `<span style="color:${i<=n?'#fbbf24':'#2e3040'};font-size:${size}px">★</span>`).join('');
}
function filteredGames() {
  return games.filter(g => {
    if (filterPlatform !== 'all' && g.platform !== filterPlatform) return false;
    if (filterStatus   !== 'all' && g.status   !== filterStatus)   return false;
    if (searchQ && !g.title.toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(t) {
  tab = t;
  document.getElementById('tab-library').className = 'tab-btn' + (t === 'library' ? ' active' : '');
  document.getElementById('tab-rec').className     = 'tab-btn' + (t === 'rec'     ? ' active' : '');
  render();
}
function setFilter(type, val) { if (type==='platform') filterPlatform=val; else filterStatus=val; render(); }
function setSearch(v)         { searchQ = v; render(); }

// ── Library render ────────────────────────────────────────────────────────────
function renderLibrary() {
  const fg     = filteredGames();
  const total  = games.length;
  const played = games.filter(g => g.status === 'Played').length;
  const playing= games.filter(g => g.status === 'Playing').length;
  const rated  = games.filter(g => g.stars > 0);
  const avg    = rated.length ? Math.round(rated.reduce((a,g) => a + g.stars, 0) / rated.length * 10) / 10 : 0;

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total games</div></div>
      <div class="stat-card"><div class="stat-num">${played}</div><div class="stat-lbl">Completed</div></div>
      <div class="stat-card"><div class="stat-num">${playing}</div><div class="stat-lbl">In progress</div></div>
      <div class="stat-card"><div class="stat-num">${avg || '—'}</div><div class="stat-lbl">Avg rating</div></div>
    </div>`;

  const pillsHtml = `
    <div class="platform-pills">
      <span class="plat-pill all${filterPlatform==='all'?' active':''}" onclick="setFilter('platform','all')">All</span>
      ${PLATFORMS.map(p => `<span class="plat-pill ${p.id}${filterPlatform===p.id?' active':''}" onclick="setFilter('platform','${p.id}')">${p.short}</span>`).join('')}
    </div>`;

  const toolbarHtml = `
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search your library..." value="${escH(searchQ)}" oninput="setSearch(this.value)">
      </div>
      <select class="filter-sel" onchange="setFilter('status',this.value)">
        <option value="all"${filterStatus==='all'?' selected':''}>All statuses</option>
        ${STATUSES.map(s => `<option value="${s}"${filterStatus===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <button class="add-btn" onclick="openAddModal()">+ Add game</button>
    </div>`;

  let gridHtml = '';
  if (fg.length === 0) {
    gridHtml = `<div class="empty-state"><div class="e-icon">🎮</div><p>No games match your filters</p></div>`;
  } else {
    gridHtml = `<div class="game-grid">${fg.map(g => {
      const art      = artCache[g.title];
      const fetching = fetchingArt.has(g.title);
      const emoji    = GENRE_EMOJI[g.genre] || '🎮';
      return `
        <div class="game-card" onclick="openEditModal('${g.id}')">
          <div class="game-art" style="background:${artBg(g.platform)}">
            <span class="plat-dot dot-${g.platform}"></span>
            ${art
              ? `<img src="${escH(art)}" alt="${escH(g.title)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
              : ''}
            <div class="game-art-emoji" style="${art ? 'display:none' : ''}">${emoji}</div>
            ${fetching ? `<div class="art-loading-bar"></div>` : ''}
            <span class="game-badge badge-${g.status.toLowerCase()}">${g.status}</span>
          </div>
          <div class="game-info">
            <div class="game-title">${escH(g.title)}</div>
            <div class="game-meta">
              <span class="game-genre">${g.genre || ''}</span>
              <span>${g.stars > 0 ? starsHtml(g.stars) : ''}</span>
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  return statsHtml + pillsHtml + toolbarHtml + gridHtml;
}

// ── Recommend render ──────────────────────────────────────────────────────────
function renderRecommend() {
  const playedGames = games.filter(g => g.status === 'Played' || g.status === 'Playing');
  if (playedGames.length === 0) {
    return `<div class="empty-state"><div class="e-icon">🎮</div><p>Add some played games first so I can make smart picks!</p></div>`;
  }

  let resultHtml = '';
  if (recLoading) {
    resultHtml = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
  } else if (recResult) {
    const art   = artCache[recResult.rawTitle];
    const emoji = GENRE_EMOJI[recResult.genre] || '🎮';
    resultHtml = `
      <div class="rec-result">
        <div class="rec-result-art">
          ${art ? `<img src="${escH(art)}" alt="">` : `<div class="emoji-fallback">${emoji}</div>`}
        </div>
        <div class="rec-result-body">
          <div class="rec-title">${escH(recResult.title)}</div>
          <div class="rec-sub">${escH(recResult.platform)}${recResult.genre ? ' · ' + recResult.genre : ''}${recResult.stars > 0 ? ' · ' + recResult.stars + '/5 ★' : ''}</div>
          ${(recResult.tags || []).map(t => `<span class="rec-tag">${escH(t)}</span>`).join('')}
          <div class="rec-reason">${escH(recResult.reason)}</div>
          ${recResult.status === 'Backlog' || recResult.status === 'Wishlist'
            ? `<button class="mark-played-btn" onclick="startPlaying('${recResult.id}')">▶ Start playing this</button>` : ''}
        </div>
      </div>`;
  }

  return `
    <div class="rec-wrap">
      <div class="rec-hero">
        <h2>WHAT'S NEXT?</h2>
        <p>Can't decide? Let me pick your next game.</p>
      </div>
      <div class="rec-options">
        <div class="rec-opt-card${recMode==='random'?' selected':''}" onclick="setRecMode('random')">
          <div class="icon">🎲</div>
          <div class="ttl">Random pick</div>
          <div class="desc">Surprise me from my backlog</div>
        </div>
        <div class="rec-opt-card${recMode==='similar'?' selected':''}" onclick="setRecMode('similar')">
          <div class="icon">🧠</div>
          <div class="ttl">Based on last game</div>
          <div class="desc">AI-matched to what I loved</div>
        </div>
      </div>
      ${recMode === 'similar' ? `
        <div class="rec-config">
          <label>Last game I played</label>
          <select onchange="recLastGame=this.value">
            <option value="">Pick a game...</option>
            ${playedGames.map(g => `<option value="${g.id}"${recLastGame===g.id?' selected':''}>${escH(g.title)}</option>`).join('')}
          </select>
        </div>` : ''}
      <button class="spin-btn" onclick="getRecommendation()" ${recLoading ? 'disabled' : ''}>
        ${recLoading ? 'THINKING...' : '⚡ RECOMMEND SOMETHING'}
      </button>
      ${resultHtml}
    </div>`;
}

// ── Recommendation logic ──────────────────────────────────────────────────────
function setRecMode(m) { recMode = m; recResult = null; render(); }

async function getRecommendation() {
  const backlog = games.filter(g => g.status === 'Backlog' || g.status === 'Wishlist');
  if (backlog.length === 0) {
    recResult = { title:'No backlog!', platform:'', genre:'', stars:0, tags:[], reason:"Add some games to your backlog first.", id:null, status:'' };
    render(); return;
  }

  if (recMode === 'random') {
    const pick = backlog[Math.floor(Math.random() * backlog.length)];
    recResult  = { ...pick, rawTitle: pick.title, platform: platShort(pick.platform), reason: `A random pick from your ${backlog.length}-game backlog.${pick.notes ? ' Your note: "' + pick.notes + '"' : ''}`, tags: ['Random Pick', 'From Backlog'] };
    render(); return;
  }

  if (!recLastGame) { alert('Pick a game you last played first!'); return; }
  const lastGame = games.find(g => g.id === recLastGame);
  if (!lastGame) return;

  recLoading = true; render();

  try {
    const summary = backlog.map(g => `- ${g.title} (${platShort(g.platform)}, ${g.genre})`).join('\n');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 600,
        messages: [{ role: 'user', content:
          `You are a video game recommendation engine. A gamer just played "${lastGame.title}" (genre: ${lastGame.genre}, platform: ${platShort(lastGame.platform)}, rating: ${lastGame.stars}/5). Notes: "${lastGame.notes || 'none'}".

Pick the BEST next game from their backlog. Explain in 2-3 sentences why it's a great follow-up.

Backlog:
${summary}

Respond ONLY as JSON (no markdown fences):
{"title":"exact title from backlog","reason":"2-3 sentence explanation","tags":["tag1","tag2","tag3"]}`
        }]
      })
    });
    const data   = await res.json();
    const text   = (data.content || []).map(b => b.text || '').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    const matched = backlog.find(g => g.title.toLowerCase() === parsed.title.toLowerCase())
                 || backlog.find(g => g.title.toLowerCase().includes(parsed.title.toLowerCase().slice(0,8)))
                 || backlog[0];
    recResult = { ...matched, rawTitle: matched.title, platform: platShort(matched.platform), reason: parsed.reason, tags: parsed.tags || [] };
  } catch(e) {
    const pick = backlog[Math.floor(Math.random() * backlog.length)];
    recResult  = { ...pick, rawTitle: pick.title, platform: platShort(pick.platform), reason: "Here's a solid pick from your backlog.", tags: ['From Backlog'] };
  }

  recLoading = false; render();
}

function startPlaying(id) {
  const g = games.find(g => g.id === id);
  if (g) { g.status = 'Playing'; saveGames(); }
  recResult = null; render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openAddModal() {
  modalMode = 'add';
  pendingGame   = { platform:'sx', status:'Backlog', genre:'Action', stars:0, notes:'' };
  pendingStars  = 0; pendingArtUrl = ''; pendingArtOpts = [];
  renderModal();
}
function openEditModal(id) {
  modalMode = 'edit'; editId = id;
  const g = games.find(g => g.id === id);
  pendingGame  = { ...g };
  pendingStars = g.stars || 0;
  pendingArtUrl= artCache[g.title] || '';
  pendingArtOpts = [];
  renderModal();
}

function renderModal() {
  const ml = document.getElementById('modal-layer');
  const artPreview = pendingArtUrl
    ? `<img src="${escH(pendingArtUrl)}" onerror="this.style.display='none'">`
    : `<span class="no-art-label">No art yet</span>`;

  ml.innerHTML = `
    <div class="modal-overlay" onclick="closeModalOverlay(event)">
      <div class="modal">
        <div class="modal-head">
          <h2>${modalMode === 'add' ? 'ADD GAME' : 'EDIT GAME'}</h2>
          <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-art-preview" id="modal-art-preview">${artPreview}</div>

          <div class="form-group">
            <label>Game title</label>
            <input type="text" id="f-title" value="${escH(pendingGame.title || '')}" placeholder="Enter game title...">
            <button class="btn-secondary" id="art-search-btn" onclick="searchArtForModal()">Search box art from RAWG</button>
            <div class="art-results-grid" id="art-results"></div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Platform</label>
              <div class="plat-grid" id="plat-grid">
                ${PLATFORMS.map(p => `
                  <div class="plat-option${pendingGame.platform===p.id?' selected':''}" onclick="pickPlat('${p.id}')">
                    <div class="dot" style="background:${p.color}"></div>
                    <span class="name">${p.short}</span>
                  </div>`).join('')}
              </div>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="f-status">
                ${STATUSES.map(s => `<option${pendingGame.status===s?' selected':''}>${s}</option>`).join('')}
              </select>
              <div style="margin-top:10px">
                <label>Genre</label>
                <select id="f-genre">
                  ${GENRES.map(g => `<option${pendingGame.genre===g?' selected':''}>${g}</option>`).join('')}
                </select>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Your rating</label>
            <div class="star-picker" id="star-picker">
              ${[1,2,3,4,5].map(n => `<button class="star-pick${n<=pendingStars?' lit':''}" onclick="pickStars(${n})">★</button>`).join('')}
            </div>
          </div>

          <div class="form-group">
            <label>Notes</label>
            <textarea id="f-notes" placeholder="Thoughts, progress, memorable moments...">${escH(pendingGame.notes || '')}</textarea>
          </div>
        </div>
        <div class="modal-foot">
          ${modalMode === 'edit' ? `<button class="btn-danger" onclick="deleteGame('${editId}')">Delete</button>` : ''}
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="saveGame()">Save</button>
        </div>
      </div>
    </div>`;

  // Re-render art results if we already have some
  if (pendingArtOpts.length > 0) renderArtResults();
}

async function searchArtForModal() {
  const title = document.getElementById('f-title')?.value?.trim();
  if (!title) { alert('Enter a game title first!'); return; }
  const btn = document.getElementById('art-search-btn');
  if (btn) { btn.textContent = 'Searching...'; btn.disabled = true; }
  pendingArtOpts = await fetchArtOptions(title);
  if (btn) { btn.textContent = 'Search box art from RAWG'; btn.disabled = false; }
  if (pendingArtOpts.length > 0 && !pendingArtUrl) selectArt(pendingArtOpts[0].url);
  renderArtResults();
}

function renderArtResults() {
  const el = document.getElementById('art-results');
  if (!el) return;
  if (pendingArtOpts.length === 0) { el.innerHTML = '<span style="font-size:12px;color:var(--text3)">No results found.</span>'; return; }
  el.innerHTML = pendingArtOpts.map(a =>
    `<img class="art-thumb${pendingArtUrl===a.url?' selected':''}" src="${escH(a.url)}" title="${escH(a.name)}" onclick="selectArt('${escH(a.url)}')">`
  ).join('');
}

function selectArt(url) {
  pendingArtUrl = url;
  const preview = document.getElementById('modal-art-preview');
  if (preview) preview.innerHTML = `<img src="${escH(url)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`;
  document.querySelectorAll('.art-thumb').forEach(el => { el.className = 'art-thumb' + (el.src === url ? ' selected' : ''); });
}

function closeModalOverlay(e) { if (e.target.classList.contains('modal-overlay')) closeModal(); }
function closeModal()         { document.getElementById('modal-layer').innerHTML = ''; }

function pickPlat(id) {
  pendingGame.platform = id;
  document.querySelectorAll('.plat-option').forEach(el => {
    const n = el.querySelector('.name')?.textContent;
    const p = PLATFORMS.find(p => p.short === n);
    el.className = 'plat-option' + (p && p.id === id ? ' selected' : '');
  });
}
function pickStars(n) {
  pendingStars = n;
  document.querySelectorAll('.star-pick').forEach((el, i) => { el.className = 'star-pick' + (i < n ? ' lit' : ''); });
}

function saveGame() {
  const title = document.getElementById('f-title')?.value?.trim();
  if (!title) { alert('Enter a game title!'); return; }
  const g = {
    id:       modalMode === 'add' ? uid() : editId,
    title,
    platform: pendingGame.platform || 'sx',
    status:   document.getElementById('f-status')?.value  || 'Backlog',
    genre:    document.getElementById('f-genre')?.value   || 'Action',
    stars:    pendingStars,
    notes:    document.getElementById('f-notes')?.value   || '',
  };
  if (pendingArtUrl) { artCache[title] = pendingArtUrl; saveArt(); }
  if (modalMode === 'add') games.unshift(g);
  else { const i = games.findIndex(x => x.id === editId); if (i >= 0) games[i] = g; }
  saveGames();
  closeModal();
  render();
  if (!artCache[title]) fetchArt(title);
}

function deleteGame(id) {
  if (!confirm('Remove this game from your library?')) return;
  games = games.filter(g => g.id !== id);
  saveGames();
  closeModal();
  render();
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const mc = document.getElementById('main-content');
  if (!mc) return;
  mc.innerHTML = tab === 'library' ? renderLibrary() : renderRecommend();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData();
render();
fetchAllMissingArt();
</script>
</body>
</html>
